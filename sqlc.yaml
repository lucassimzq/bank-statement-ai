version: "2"
sql:
  - engine: "postgresql"
    queries: "cards/query.sql"
    schema: "cards/migrations"
    gen:
      go:
        package: "db"
        out: "cards/db"
        sql_package: "database/sql"
        emit_json_tags: true
        json_tags_case_style: "snake"
  - engine: "postgresql"
    queries: "statements/query.sql"
    schema: "statements/migrations"
    gen:
      go:
        package: "db"
        out: "statements/db"
        sql_package: "database/sql"
        emit_json_tags: true
        json_tags_case_style: "snake"
  - engine: "postgresql"
    queries: "transactions/query.sql"
    schema: "transactions/migrations"
    gen:
      go:
        package: "db"
        out: "transactions/db"
        sql_package: "database/sql"
        emit_json_tags: true
        json_tags_case_style: "snake"
